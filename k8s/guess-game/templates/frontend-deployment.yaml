apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: guess-game
    component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: guess-game
      component: frontend
  template:
    metadata:
      labels:
        app: guess-game
        component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
