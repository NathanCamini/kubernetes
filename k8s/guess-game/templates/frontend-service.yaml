apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: guess-game
    component: frontend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.port }}
      protocol: TCP
  selector:
    app: guess-game
    component: frontend
