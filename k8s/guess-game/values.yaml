# Banco de Dados
db:
  image:
    repository: postgres
    tag: "16"
  credentials:
    user: postgres
    password: secretpass
    database: postgres
  service:
    port: 5432

# Backend
backend:
  image:
    repository: "nathancamini/demo-game-backend"
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 5000
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Frontend
frontend:
  image:
    repository: "nathancamini/demo-game-frontend"
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 80
  ingress:
    enabled: true
    className: "traefik"
